<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Login - Velvet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6B46C1 0%, #553C9A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 32px;
            color: #6B46C1;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #6B46C1;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #6B46C1;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #553C9A;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }
        
        .forgot-password a {
            color: #6B46C1;
            text-decoration: none;
            font-size: 14px;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #6B46C1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎀 Velvet</h1>
            <p>Creator Login</p>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="creatorEmail" placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="creatorPassword" placeholder="••••••••">
        </div>
        
        <button class="btn" onclick="handleCreatorLogin()">Login</button>
        
        <div id="errorDiv" class="error"></div>

        <div class="forgot-password">
            <a href="#" onclick="handleForgotPassword(); return false;">Forgot Password?</a>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Calculator</a>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyArbpb25d8UwEL5bE46Oe8yAMTMM1BoGzU",
            authDomain: "velvet-app-1733e.firebaseapp.com",
            projectId: "velvet-app-1733e",
            storageBucket: "velvet-app-1733e.firebasestorage.app",
            messagingSenderId: "514672347699",
            appId: "1:514672347699:web:a70516f6383e0069a7f146"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.handleCreatorLogin = async function() {
            const email = document.getElementById('creatorEmail').value.trim().toLowerCase();
            const password = document.getElementById('creatorPassword').value;
            const errorDiv = document.getElementById('errorDiv');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }
            
            try {
                // Sign in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Check if this email belongs to a creator
                const creatorsQuery = query(collection(db, 'creators'), where('email', '==', email));
                const creatorsSnapshot = await getDocs(creatorsQuery);
                
                if (creatorsSnapshot.empty) {
                    errorDiv.textContent = 'Not authorized as creator';
                    await auth.signOut();
                    return;
                }
                
                // Redirect to creator dashboard
                window.location.href = 'creator-dashboard.html';
            } catch (error) {
                errorDiv.textContent = 'Invalid email or password';
                console.error('Creator login error:', error);
            }
        }

        window.handleForgotPassword = async function() {
            const email = document.getElementById('creatorEmail').value.trim().toLowerCase();
            const errorDiv = document.getElementById('errorDiv');

            if (!email) {
                errorDiv.textContent = 'Please enter your email first';
                errorDiv.style.color = '#e74c3c';
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                errorDiv.textContent = 'Password reset email sent! Check your inbox.';
                errorDiv.style.color = '#27ae60';
            } catch (error) {
                errorDiv.textContent = 'Error sending reset email. Please check your email address.';
                errorDiv.style.color = '#e74c3c';
                console.error('Password reset error:', error);
            }
        }

        // Enter key support
        document.getElementById('creatorPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleCreatorLogin();
            }
        });
    </script>
</body>
</html>
